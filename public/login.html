<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WhatsApp Bulk Sender</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #25D366;
    --green-dark: #1ebe5d;
    --bg: #f0f2f5;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text2: #6b7280;
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: var(--green);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 26px; height: 26px; fill: white; }
  .logo h1 { font-size: 20px; font-weight: 700; color: var(--text); }
  .subtitle { text-align: center; font-size: 13px; color: var(--text2); margin-bottom: 28px; }

  label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  input[type=email], input[type=password] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #f7f8fa;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(37,211,102,0.12);
    background: white;
  }
  .field { margin-bottom: 16px; }

  .btn {
    width: 100%;
    padding: 11px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .btn:hover { background: var(--green-dark); }
  .btn:disabled { background: #9FE1CB; cursor: not-allowed; }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0;
    color: var(--text2); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .btn-google {
    width: 100%;
    padding: 10px;
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-google:hover { background: #f7f8fa; }
  .btn-google svg { width: 18px; height: 18px; }

  .error-msg {
    background: #fee2e2;
    color: var(--red);
    border: 1px solid #fecaca;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .toggle-link {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text2);
  }
  .toggle-link a { color: var(--green); text-decoration: none; font-weight: 500; cursor: pointer; }
  .toggle-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <h1>WA Bulk Sender</h1>
  </div>

  <p class="subtitle">Sign in to access your dashboard</p>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Email / Password form -->
  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
    </div>
    <button class="btn" id="loginBtn" onclick="submitLogin()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="googleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <div class="toggle-link">
    Don't have an account? <a onclick="toggleRegister()">Sign up</a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { firebaseConfig } from '/firebase-config.js';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let isRegister = false;

  window.toggleRegister = function() {
    isRegister = !isRegister;
    document.querySelector('.subtitle').textContent = isRegister ? 'Create a new account' : 'Sign in to access your dashboard';
    document.getElementById('loginBtn').textContent = isRegister ? 'Create Account' : 'Sign In';
    document.querySelector('.toggle-link').innerHTML = isRegister
      ? 'Already have an account? <a onclick="toggleRegister()">Sign in</a>'
      : 'Don\'t have an account? <a onclick="toggleRegister()">Sign up</a>';
    clearError();
  };

  window.submitLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    if (!email || !password) { showError('Please enter email and password.'); return; }

    btn.disabled = true;
    btn.textContent = isRegister ? 'Creating...' : 'Signing in...';
    clearError();

    try {
      const cred = isRegister
        ? await createUserWithEmailAndPassword(auth, email, password)
        : await signInWithEmailAndPassword(auth, email, password);
      await sendTokenToServer(cred.user);
    } catch (err) {
      showError(friendlyError(err.code));
    } finally {
      btn.disabled = false;
      btn.textContent = isRegister ? 'Create Account' : 'Sign In';
    }
  };

  window.googleLogin = async function() {
    clearError();
    try {
      const cred = await signInWithPopup(auth, provider);
      await sendTokenToServer(cred.user);
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') showError(friendlyError(err.code));
    }
  };

  async function sendTokenToServer(user) {
    const idToken = await user.getIdToken();
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      showError(data.message || 'Server authentication failed.');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() {
    document.getElementById('errorMsg').style.display = 'none';
  }
  function friendlyError(code) {
    const map = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>

</body>
</html>
